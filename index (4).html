<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question 2 - Payment Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Question 2 - Form Logic & Validation</span>
    </div>
  </nav>

  <div class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="mb-4">Payment Form</h2>

        <form id="paymentForm" novalidate>
          <fieldset class="border rounded p-3 mb-4">
            <legend class="float-none w-auto px-2 fs-5">Billing Information</legend>

            <input type="text" id="name" class="form-control mb-3" placeholder="Full Name" required>
            <input type="text" id="address" class="form-control mb-3" placeholder="Address" required>
            <input type="text" id="city" class="form-control mb-3" placeholder="City" required>

            <div class="row">
              <div class="col-md-6">
                <input type="text" id="state" class="form-control mb-3" placeholder="State / Province" required>
              </div>
              <div class="col-md-6">
                <input type="text" id="postalCode" class="form-control mb-3" placeholder="Postal Code" required>
              </div>
            </div>

            <input type="email" id="email" class="form-control mb-3" placeholder="Email Address" required>

            <select id="country" class="form-select mb-3" required>
              <option value="">Choose your country</option>
              <option value="Jamaica">Jamaica</option>
              <option value="USA">USA</option>
              <option value="Canada">Canada</option>
            </select>

            <label class="form-label fw-bold">Payment Method</label>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="paymentMethod" value="PayPal" id="paypal" checked>
              <label class="form-check-label" for="paypal">PayPal</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="paymentMethod" value="Visa" id="visa">
              <label class="form-check-label" for="visa">Visa</label>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="radio" name="paymentMethod" value="MasterCard" id="mastercard">
              <label class="form-check-label" for="mastercard">MasterCard</label>
            </div>

            <div id="cardSection">
              <input type="text" id="cardNumber" class="form-control mb-3 card-field" placeholder="Card Number">
              <input type="text" id="expiry" class="form-control mb-3 card-field" placeholder="Expiry Date (MM/YY)">
              <input type="text" id="cvv" class="form-control mb-3 card-field" placeholder="CVV">
            </div>
          </fieldset>

          <fieldset class="border rounded p-3 mb-4">
            <legend class="float-none w-auto px-2 fs-5">Shipping Information</legend>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="sameAsBilling" checked>
              <label class="form-check-label" for="sameAsBilling">Same as billing information</label>
            </div>

            <div id="shippingFields" class="d-none">
              <input type="text" id="shippingName" class="form-control mb-3" placeholder="Shipping Name">
              <input type="text" id="shippingAddress" class="form-control mb-3" placeholder="Shipping Address">
              <input type="text" id="shippingCity" class="form-control mb-3" placeholder="Shipping City">
            </div>
          </fieldset>

          <button type="submit" class="btn btn-primary w-100">Submit Form</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

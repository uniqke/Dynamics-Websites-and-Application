<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question 1 - Employee Data</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Question 1 - Modern Data Fetching & Arrays</span>
    </div>
  </nav>

  <div class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="mb-4">Employee List</h2>

        <input type="text" id="search" class="form-control mb-4" placeholder="Search employee by name">

        <ul id="demo" class="list-group mb-4"></ul>

        <p id="totalSalary" class="fw-bold text-primary fs-5"></p>

        <div class="d-flex flex-wrap gap-2">
          <button id="showStorage" class="btn btn-success">Show localStorage</button>
          <button id="removeStorage" class="btn btn-warning">Remove localStorage Item</button>
          <button id="clearStorage" class="btn btn-danger">Clear localStorage</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
